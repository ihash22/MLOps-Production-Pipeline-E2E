name: MLOps E2E Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    # 1. Read environment.yml and build the exact Conda environment
    - name: 🐍 Set up Conda Environment
      uses: conda-incubator/setup-miniconda@v3
      with:
        environment-file: environment.yml
        activate-environment: mlops_prod
        auto-activate: false

    # 2. Execute the training & tuning script inside the Conda env
    - name: 🧠 Run Distributed Training (Ray + MLflow)
      shell: bash -el {0}
      run: |
        pip install "setuptools==69.5.1" wheel
        python src/train_ray.py

    # 3. Execute the promotion script to isolate the best model
    - name: 🏆 Promote Best Model
      shell: bash -el {0}
      run: |
        python src/promote_model.py

    # 4. Run the drift detection logic
    - name: 📊 Run Data Drift Monitor
      shell: bash -el {0}
      run: |
        python src/monitor.py

    # 5. Save the Evidently HTML report as a downloadable artifact
    - name: 💾 Upload Drift Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: data-drift-report
        path: docs/reports/data_drift_report.html

    # 6. Test the Docker Build using your lean requirements-serve.txt
    - name: 🐳 Test Docker Build
      run: |
        docker build -t iris-predictor:ci-test -f Dockerfile.serve .