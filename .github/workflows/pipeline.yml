name: MLOps E2E Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-promote:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run E2E Tests
      run: |
        python -m pytest tests/test_train.py

    - name: Run Model Promotion
      run: |
        # We run the training script first to ensure there is data to promote
        python src/train.py
        python src/promote_model.py

    - name: Verify Staging Artifact
      run: |
        if [ -f "dist/best_run.txt" ]; then
          echo "✅ Model Promotion Successful"
        else
          echo "❌ Promotion Failed"
          exit 1
        fi

    - name: Run Data Drift Monitoring
          run: |
            python src/monitor.py

        - name: Upload Drift Report
          uses: actions/upload-artifact@v4
          with:
            name: data-drift-report
            path: docs/reports/data_drift_report.html